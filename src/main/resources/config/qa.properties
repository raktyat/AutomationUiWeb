# ============================================
# QA Environment Configuration
# ============================================

# Web Application URLs
web.base.url=https://qa.example.com
web.admin.url=https://qa-admin.example.com

# API Base URLs
api.base.url=https://qa-api.example.com
api.version=v1

# Database Configuration
db.url=jdbc:mysql://qa-db.example.com:3306/testdb
db.username=qa_user
db.password=${QA_DB_PASSWORD}

# Test Data
testdata.path=src/test/resources/testdata/qa

# Feature Flags
feature.payments.enabled=true
feature.notifications.enabled=true

# Mobile App Configuration
android.app.path=src/test/resources/apps/qa/app-release.apk
ios.app.path=src/test/resources/apps/qa/app-release.ipa
