# ============================================
# Framework Global Configuration
# ============================================

# Execution Platform: local, grid, browserstack, saucelabs
execution.platform=local

# Browser Configuration
browser=chrome
browser.headless=false

# Timeouts (in seconds)
timeout.implicit=10
timeout.explicit=30
timeout.page.load=60
timeout.script=30

# Retry Configuration
retry.count=2
retry.delay=1000

# Screenshots
screenshot.on.failure=true
screenshot.on.pass=false
screenshot.path=target/screenshots

# Reports
report.path=target/extent-reports
report.name=Automation Report
report.title=Test Execution Report

# Logging
log.level=INFO

# Selenium Grid Configuration
grid.url=http://localhost:4444/wd/hub

# BrowserStack Configuration
browserstack.url=https://{username}:{accessKey}@hub-cloud.browserstack.com/wd/hub
browserstack.username=${BROWSERSTACK_USERNAME}
browserstack.accesskey=${BROWSERSTACK_ACCESS_KEY}
browserstack.local=false
browserstack.debug=true
browserstack.networkLogs=true

# Sauce Labs Configuration
saucelabs.url=https://{username}:{accessKey}@ondemand.us-west-1.saucelabs.com/wd/hub
saucelabs.username=${SAUCE_USERNAME}
saucelabs.accesskey=${SAUCE_ACCESS_KEY}

# Appium Configuration
appium.url=http://localhost:4723
appium.automation.name.android=UiAutomator2
appium.automation.name.ios=XCUITest

# API Configuration
api.connection.timeout=30000
api.socket.timeout=30000
api.log.request=true
api.log.response=true
