# ============================================
# PROD Environment Configuration
# ============================================

# Web Application URLs
web.base.url=https://www.example.com
web.admin.url=https://admin.example.com

# API Base URLs
api.base.url=https://api.example.com
api.version=v1

# Database Configuration (Read-only access for verification)
db.url=jdbc:mysql://prod-db-readonly.example.com:3306/testdb
db.username=readonly_user
db.password=${PROD_DB_PASSWORD}

# Test Data
testdata.path=src/test/resources/testdata/prod

# Feature Flags
feature.payments.enabled=true
feature.notifications.enabled=true

# Mobile App Configuration
android.app.path=src/test/resources/apps/prod/app-release.apk
ios.app.path=src/test/resources/apps/prod/app-release.ipa
