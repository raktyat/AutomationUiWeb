# ============================================
# DEV Environment Configuration
# ============================================

# Web Application URLs
web.base.url=https://dev.example.com
web.admin.url=https://dev-admin.example.com

# API Base URLs
api.base.url=https://dev-api.example.com
api.version=v1

# Database Configuration
db.url=jdbc:mysql://dev-db.example.com:3306/testdb
db.username=dev_user
db.password=${DEV_DB_PASSWORD}

# Test Data
testdata.path=src/test/resources/testdata/dev

# Feature Flags
feature.payments.enabled=true
feature.notifications.enabled=false

# Mobile App Configuration
android.app.path=src/test/resources/apps/dev/app-debug.apk
ios.app.path=src/test/resources/apps/dev/app-debug.ipa
